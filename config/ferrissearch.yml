# Node identity
node_name: "ferrissearch-dev-1"
cluster_name: "ferrissearch-local"

# Networking
http_port: 9200
transport_port: 9300

# SQL analytics
# Default is true. Set to false if you want exact coordinator-side merge
# instead of approximate shard-level top-K pruning for eligible GROUP BY queries.
# sql_approximate_top_k: false

# HTTP security (disabled by default)
# security:
#   enabled: false
#   auto_create_security_index: false
#   bootstrap_api_keys:
#     - id: "admin-key"
#       name: "admin"
#       hash_sha256: "sha256:<64-char-sha256-hex>"
#       roles: ["admin"]
#       indices: ["*"]

# Client-facing HTTP API TLS (HTTPS, disabled by default)
# Requires building with the `http-tls` Cargo feature, e.g.:
#   cargo build --release --features http-tls
# Setting http_tls_enabled without that feature is a startup error — the
# server never silently falls back to plaintext HTTP.
# http_tls_enabled: false
# http_tls_cert_file: "/path/to/server.pem"
# http_tls_key_file: "/path/to/server-key.pem"

# Storage
# data_dir: "./data/ferrissearch-dev-1"
